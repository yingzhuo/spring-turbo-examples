plugins {
    id 'java'
}

group 'com.github.yingzhuo'
version '0.0.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation(libs.spring.boot.web)
    implementation(libs.spring.boot.security)
    implementation(libs.spring.boot.actuator)
    implementation(libs.spring.turbo.predefined)
    implementation(libs.spring.turbo.webmvc)
    implementation(libs.spring.turbo.security)
    implementation(libs.spring.turbo.security.jwt)
    implementation(libs.spring.turbo.security.hutool)

    compileOnly 'org.projectlombok:lombok:1.18.22'
    annotationProcessor 'org.projectlombok:lombok:1.18.22'
}

test {
    useJUnitPlatform()
}
